<!doctype html>
<html lang="en">

    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Meta Tags -->
    <title>Medora AI - Premium AI Healthcare & Longevity Platform</title>

    <meta name="description" content="Discover Medora AI, a futuristic AI-driven healthcare platform. Access 24/7 symptom triages, explain EHR reports, consult verified specialists, and track medical compliance securely." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://medora.ai/" />
    <meta property="og:title" content="Medora AI - Premium AI Healthcare & Longevity Platform" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://medora.ai/" />
    <meta property="twitter:title" content="Medora AI - Premium AI Healthcare & Longevity Platform" />
    <meta property="twitter:description" content="Access continuous AI diagnostics, upload and parse EHR laboratory reports, consult top certified clinical specialists, and synchronize wear-tech biometrics securely." />

    <!-- Structured JSON-LD Content for SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MedicalWebSite",
        "name": "Medora AI",
        "url": "https://medora.ai",
        "description": "Futuristic AI-driven healthcare and longevity platform providing symptom triages, laboratory interpretations, and certified virtual medical consults.",
        "audience": {
          "@type": "PeopleAudience",
          "suggestedAudience": "Patients seeking wellness tracking and preventive medicine consults"
        },
        "about": {
          "@type": "MedicalSpecialty",
          "name": "General Triage, Preventive Medicine, Neurology, Cardiology"
        },
        "sponsor": {
          "@type": "MedicalOrganization",
          "name": "Medora Digital Healthcare Systems"
        }
      }
    </script>
  </head>
  <body class="bg-[#030014] text-[#e2e8f0] min-h-screen font-sans">
    <div id="root"></div>
